<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login & Cadastro</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">
    <div class="card">

        <!-- LOGIN -->
        <div id="login">
            <h2>Bem-vindo</h2>
            <p class="subtitle">Entre com sua conta</p>

            <input type="text" id="loginUser" placeholder="Usuário">
            <input type="password" id="loginPass" placeholder="Senha">

            <button onclick="login()">Entrar</button>
            <p class="error" id="loginError"></p>

            <div class="toggle">
                Não tem conta? <a onclick="mostrarCadastro()">Criar cadastro</a>
            </div>
        </div>

        <!-- CADASTRO -->
        <div id="cadastro" class="hidden">
            <h2>Criar Conta</h2>
            <p class="subtitle">Preencha seus dados</p>

            <input type="text" id="cadUser" placeholder="Usuário">
            <input type="date" id="cadNascimento">
            <input type="password" id="cadPass" placeholder="Senha">
            <input type="password" id="cadPass2" placeholder="Confirmar senha">

            <button onclick="cadastrar()">Cadastrar</button>

            <p class="error" id="cadError"></p>
            <p class="success" id="cadSuccess"></p>

            <div class="toggle">
                Já tem conta? <a onclick="mostrarLogin()">Voltar para login</a>
            </div>
        </div>

    </div>
</div>

<script src="index.js"></script>
</body>
</html>
