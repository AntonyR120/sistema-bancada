<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bancadas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bancada.css">
</head>
<body>

<!-- BOTÃO SIDEBAR -->
<button id="openSidebar" class="openSidebarBtn">&#9776; Usuários</button>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2 id="sidebarTitulo">Usuários</h2>
        <button id="closeSidebar">&times;</button>
    </div>

    <div class="acoesSidebar">
        <input type="text" id="sidebarSearch" placeholder="Buscar usuário...">
        <button id="addUserSidebar">+ Adicionar Usuário</button>
    </div>

    <ul id="sidebarUserList">
        <li>João</li>
        <li>Maria</li>
        <li>Carlos</li>
        <li>Ana</li>
    </ul>
</aside>

<header>
    <h1>BANCADAS</h1>
</header>

<!-- LISTA DE BANCADAS -->
<main id="listaBancadas">
    <section class="container">

        <article class="card" data-bancada="Estoque">
            <h2>BANCADA ESTOQUE</h2>
            <img src="./assets/bancada_estoque.png" alt="Bancada Estoque">
            <button class="btnDetalhes">Ver Detalhes</button>
        </article>

        <article class="card" data-bancada="Expedição">
            <h2>BANCADA EXPEDIÇÃO</h2>
            <img src="./assets/bancada_expedicao.png" alt="Bancada Expedição">
            <button class="btnDetalhes">Ver Detalhes</button>
        </article>

        <article class="card" data-bancada="Montagem">
            <h2>BANCADA MONTAGEM</h2>
            <img src="./assets/bancada_montagem.png" alt="Bancada Montagem">
            <button class="btnDetalhes">Ver Detalhes</button>
        </article>

        <article class="card" data-bancada="Processo">
            <h2>BANCADA PROCESSO</h2>
            <img src="./assets/bancada_processo.png" alt="Bancada Processo">
            <button class="btnDetalhes">Ver Detalhes</button>
        </article>

    </section>
</main>

<!-- DETALHES DA BANCADA -->
<section id="detalhesBancada">
    <button id="btnVoltar">← Voltar</button>
    <h2 id="tituloBancada"></h2>
</section>

<!-- GIF do Esqueleto -->
<img src="https://media1.tenor.com/m/QYv_frCjNLUAAAAd/skeleton-shield.gif" id="skeletonGif" alt="Esqueleto batendo no escudo">

<script src="bancada.js"></script>
</body>
</html>
